<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Calendario · Niños Creativos 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4fa;min-height:100vh}
.app{max-width:500px;margin:0 auto;padding:12px 12px 32px}
.hdr{background:#fff;border-radius:16px;border:1.5px solid #e5e7eb;padding:16px;text-align:center;margin-bottom:12px}
.hdr img{max-width:260px;height:auto;margin-bottom:6px}
.hdr-loc{font-size:11px;color:#9ca3af;font-weight:700}
.contact-bar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.cpill{display:flex;align-items:center;gap:5px;background:#f0f4fa;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:800;color:#374151;text-decoration:none}
.view-tabs{display:flex;gap:6px;margin-bottom:12px;background:#fff;border-radius:12px;padding:6px;border:1.5px solid #e5e7eb}
.vtab{flex:1;padding:9px 4px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;text-align:center;color:#9ca3af;background:transparent;transition:all .2s}
.vtab.active{background:#1d6fa4;color:#fff}
.grp-tabs{display:flex;gap:8px;margin-bottom:12px}
.gtab{flex:1;padding:10px 6px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;text-align:center;color:#6b7280;transition:all .2s;line-height:1.4}
.gtab .gdot{font-size:20px;display:block;margin-bottom:3px}
.gtab .gage{font-size:10px;font-weight:600;display:block;color:inherit;opacity:.85}
.gtab.gv{background:#7c3aed;border-color:#7c3aed;color:#fff}
.gtab.ga{background:#d97706;border-color:#d97706;color:#fff}
.gtab.gn{background:#ea580c;border-color:#ea580c;color:#fff}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-title{font-size:16px;font-weight:900;color:#1f2937}
.nav-btn{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;font-size:18px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Nunito',sans-serif;color:#374151}
.cal-grid{background:#fff;border-radius:14px;border:1.5px solid #e5e7eb;overflow:hidden}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:#1d6fa4}
.cal-dow span{padding:7px 2px;text-align:center;font-size:9px;font-weight:900;color:#fff;letter-spacing:.3px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{border-right:.5px solid #f3f4f6;border-bottom:.5px solid #f3f4f6;padding:3px;min-height:62px;cursor:pointer;transition:background .15s}
.cal-day:hover{background:#f0f9ff}
.cal-day.empty{background:#fafafa;cursor:default}
.cal-day.feriado{background:#fef2f2!important;cursor:default}
.d-num{font-size:11px;font-weight:800;color:#374151;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;border-radius:50%}
.d-num.wknd{color:#d1d5db}
.d-tag{font-size:7.5px;font-weight:800;padding:1px 3px;border-radius:3px;line-height:1.4;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:1px}
.tag-piscina{background:#dbeafe;color:#1d4ed8}
.tag-splash{background:#e0f2fe;color:#0369a1}
.tag-crazy{background:#ffedd5;color:#9a3412}
.tag-goofy{background:#fef3c7;color:#92400e}
.tag-gira{background:#fef9c3;color:#78350f}
.tag-cierre{background:#d1fae5;color:#065f46}
.tag-feriado{background:#fee2e2;color:#b91c1c}
.tag-bienvenida{background:#fce7f3;color:#be185d}
.tag-pijama{background:#ede9fe;color:#5b21b6}
.tag-ensayo{background:#fef3c7;color:#92400e}
.tag-huerto{background:#d1fae5;color:#065f46}
.tag-default{background:#f3f4f6;color:#6b7280}
.day-sel-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.day-sel-nav button{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;font-size:16px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:900;font-family:'Nunito',sans-serif;color:#374151}
.dv-hdr{background:#fff;border-radius:14px;border:1.5px solid #e5e7eb;padding:14px;margin-bottom:10px}
.dv-date{font-size:18px;font-weight:900;color:#1f2937}
.dv-week{font-size:11px;color:#9ca3af;font-weight:700;margin-top:2px}
.dv-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.dv-note{font-size:12px;font-weight:700;color:#6b7280;margin-top:5px;display:flex;align-items:center;gap:4px}
.gira-link{display:flex;align-items:center;gap:8px;background:#fef9c3;border:1.5px solid #fcd34d;border-radius:10px;padding:10px 12px;margin-top:10px;text-decoration:none;color:inherit}
.gira-link-txt{font-size:12px;font-weight:800;color:#92400e;flex:1;line-height:1.5}
.img-box{margin-top:10px;border-radius:10px;border:2px dashed #d1d5db;background:#f9fafb;cursor:pointer;text-align:center;padding:14px;position:relative;transition:background .2s}
.img-box:hover{background:#f0f4fa}
.img-box img{width:100%;border-radius:8px;display:block}
.img-placeholder{color:#9ca3af;font-size:12px;font-weight:700;padding:4px 0}
.img-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.grp-banner{border-radius:10px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hor-rows{display:flex;flex-direction:column;gap:6px}
.hor-row{background:#fff;border-radius:10px;border:1.5px solid #e5e7eb;display:flex;align-items:center;padding:9px 12px;gap:10px}
.hor-row.rot{border-color:#a855f7;background:#faf5ff}
.hor-time{font-size:11px;font-weight:800;color:#9ca3af;min-width:82px;flex-shrink:0}
.hor-act{font-size:13px;font-weight:800;color:#1f2937;flex:1}
.hor-dur{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.dp{background:#dbeafe;color:#1d4ed8}
.db{background:#fce7f3;color:#be185d}
.dk{background:#d1fae5;color:#065f46}
.da{background:#ede9fe;color:#6d28d9}
.dg{background:#f3f4f6;color:#6b7280}
.dm{background:#fef3c7;color:#92400e}
.dt{background:#fce7f3;color:#9d174d}
.footer{text-align:center;margin-top:20px;padding:14px;background:#fff;border-radius:12px;border:1.5px solid #e5e7eb;font-size:11px;color:#9ca3af;font-weight:600;line-height:2}
.footer a{color:#1d6fa4;text-decoration:none;font-weight:800}
</style>
</head>

<script>
const ROT={
  lmv:{r1:{violeta:'Parque 🌿',amarillo:'Piscina 🏊',naranja:'Baile 💃'},r2:{violeta:'Piscina 🏊',amarillo:'Baile 💃',naranja:'Parque 🌿'},r3:{violeta:'Baile 💃',amarillo:'Parque 🌿',naranja:'Piscina 🏊'}},
  mj:{r1:{violeta:'Parque 🌿',amarillo:'Actividad 🎨',naranja:'Baile 💃'},r2:{violeta:'Actividad 🎨',amarillo:'Baile 💃',naranja:'Parque 🌿'},r3:{violeta:'Baile 💃',amarillo:'Parque 🌿',naranja:'Actividad 🎨'}}
};
const ROT_CLS={'Parque 🌿':'dk','Piscina 🏊':'dp','Baile 💃':'db','Actividad 🎨':'da'};
const SCHED=[
  {t:'7:30–8:00',a:'Recibimiento 🌞',d:'30 min',rot:false,cls:'dg'},
  {t:'8:00–8:15',a:'Devocional 🙏',d:'15 min',rot:false,cls:'dg'},
  {t:'8:15–8:30',a:'Merienda 🍎',d:'15 min',rot:false,cls:'dg'},
  {t:'8:30–9:30',a:'ROT',d:'1 hora',rot:true,rk:'r1'},
  {t:'9:30–10:30',a:'ROT',d:'1 hora',rot:true,rk:'r2'},
  {t:'10:30–11:30',a:'ROT',d:'1 hora',rot:true,rk:'r3'},
  {t:'11:30–12:30',a:'Almuerzo 🍽️',d:'1 hora',rot:false,cls:'dm'},
  {t:'12:30–1:30',a:'Actividad ✂️',d:'1 hora',rot:false,cls:'dt'},
  {t:'1:30–2:30',a:'Actividad ✂️',d:'1 hora',rot:false,cls:'dt'},
  {t:'2:30–3:00',a:'Entrega 👋',d:'30 min',rot:false,cls:'dg'},
];
let JUNE={};
let WEEKS=[];
let CAMP_DAYS=[];
const DOW=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const GRP_CLR={violeta:'#7c3aed',amarillo:'#d97706',naranja:'#ea580c'};
const GRP_NAME={violeta:'Violeta 🟣',amarillo:'Amarillo 🟡',naranja:'Naranja 🟠'};
const imageStore={};
let curView='mes',curGrp='violeta',curDayIdx=0;

function getDow(d){return(1+d-1)%7;}
function getDowName(d){return DOW[getDow(d)];}
function getWeek(d){return WEEKS.find(w=>w.days.includes(d));}

function setView(v){
  curView=v;
  document.querySelectorAll('.vtab').forEach((b,i)=>b.classList.toggle('active',['mes','dia'][i]===v));
  document.getElementById('v-mes').style.display=v==='mes'?'block':'none';
  document.getElementById('v-dia').style.display=v==='dia'?'block':'none';
  document.getElementById('grp-tabs').style.display=v==='dia'?'flex':'none';
  if(v==='dia')renderDay();
}

function setGrp(g){
  curGrp=g;
  document.querySelectorAll('.grp-tabs .gtab').forEach(t=>{
    t.className='gtab';
    if(t.getAttribute('onclick').includes("'"+g+"'"))t.classList.add(g==='violeta'?'gv':g==='amarillo'?'ga':'gn');
  });
  if(curView==='dia')renderDay();
}

function renderMonth(){
  const grid=document.getElementById('cal-days');
  grid.innerHTML='';
  // June 2026 starts Monday (dow=1), so 1 empty cell before
  grid.insertAdjacentHTML('beforeend','<div class="cal-day empty"></div>');
  for(let d=1;d<=30;d++){
    const dow=getDow(d);
    const isWknd=dow===0||dow===6;
    const data=JUNE[d]||{tags:[]};
    const isCamp=CAMP_DAYS.includes(d);
    const isFeriado=!!data.feriado;
    const cell=document.createElement('div');
    cell.className='cal-day'+(isWknd?' empty':'')+(isFeriado?' feriado':'');
    if(isCamp&&!isFeriado&&!isWknd){
      cell.style.cursor='pointer';
      cell.onclick=(()=>{const idx=CAMP_DAYS.indexOf(d);return()=>{curDayIdx=idx;setView('dia');};})();
    }
    let tags='';
    if(data.tags)data.tags.slice(0,2).forEach(t=>{tags+=`<span class="d-tag ${t.c}">${t.l}</span>`;});
    if(isFeriado)tags='<span class="d-tag tag-feriado">Feriado</span>';
    cell.innerHTML=`<div class="d-num ${isWknd?'wknd':''}">${d}</div>${tags}`;
    grid.appendChild(cell);
  }
}

function prevDay(){if(curDayIdx>0){curDayIdx--;renderDay();}}
function nextDay(){if(curDayIdx<CAMP_DAYS.length-1){curDayIdx++;renderDay();}}

function renderDay(){
  const d=CAMP_DAYS[curDayIdx];
  const data=JUNE[d]||{tags:[],notes:[]};
  const dowName=getDowName(d);
  const wk=getWeek(d);
  const type=data.type||'lmv';
  document.getElementById('day-ctr').textContent=(curDayIdx+1)+' / '+CAMP_DAYS.length;
  const hdr=document.getElementById('dv-hdr');
  let tagsHtml='';
  if(data.tags)data.tags.forEach(t=>{tagsHtml+=`<span class="d-tag ${t.c}" style="font-size:11px;padding:3px 9px">${t.l}</span>`;});
  let notesHtml='';
  if(data.notes)data.notes.forEach(n=>{notesHtml+=`<div class="dv-note">📌 ${n}</div>`;});
  let giraHtml='';
  if(data.giraLink){
    giraHtml=`<a class="gira-link" href="${data.giraLink}" target="_blank"><span style="font-size:22px">📋</span><span class="gira-link-txt">Completa el relevo y autorización de la gira<br><span style="font-size:10px;font-weight:600;opacity:.75">Toca aquí para acceder al formulario</span></span><span style="font-size:18px;color:#d97706">&#8594;</span></a>`;
  }
  let imgHtml='';
  if(data.imgUrl){
    imgHtml=`<div class="img-box" id="imgbox-${d}"><img src="${data.imgUrl}" alt="Actividad del día" style="max-width:100%;border-radius:10px;"/></div>`;
  }
  hdr.innerHTML=`
    <div class="dv-date">${dowName}, ${d} de junio</div>
    <div class="dv-week">${wk?wk.label:''}</div>
    ${tagsHtml?`<div class="dv-tags">${tagsHtml}</div>`:''}
    ${notesHtml?`<div style="margin-top:8px">${notesHtml}</div>`:''}
    ${giraHtml}${imgHtml}`;
  const bwrap=document.getElementById('grp-banner-wrap');
  if(data.feriado){bwrap.innerHTML='';document.getElementById('hor-rows').innerHTML=`<div style="text-align:center;padding:32px 16px;background:#fff;border-radius:12px;border:1.5px solid #fee2e2"><div style="font-size:36px">🏖️</div><div style="font-size:15px;font-weight:900;color:#b91c1c;margin-top:10px">Feriado — No hay campamento</div></div>`;return;}
  bwrap.innerHTML=`<div class="grp-banner" style="background:${GRP_CLR[curGrp]}"><span style="font-size:14px;font-weight:900;color:#fff">Grupo ${GRP_NAME[curGrp]}</span><span style="font-size:11px;color:rgba(255,255,255,.85);font-weight:700">${type==='mj'?'Mar · Jue':'Lun · Mié · Vie'}</span></div>`;
  const rows=document.getElementById('hor-rows');
  rows.innerHTML='';
  SCHED.forEach(item=>{
    let actName=item.a,cls=item.cls||'dg',isRot=false;
    if(item.rot){actName=ROT[type][item.rk][curGrp];cls=ROT_CLS[actName]||'da';isRot=true;}
    const row=document.createElement('div');
    row.className='hor-row'+(isRot?' rot':'');
    row.innerHTML=`<span class="hor-time">${item.t}</span><span class="hor-act">${actName}</span><span class="hor-dur ${cls}">${item.d}</span>`;
    rows.appendChild(row);
  });
}

function loadImg(e,d){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{imageStore[d]=ev.target.result;renderDay();};
  reader.readAsDataURL(file);
}

const API_URL='https://script.google.com/macros/s/AKfycbxazzQVfY3mEvNJNHwcuBWWjmOZK7WeQY3KSj9idAp0sYOj7obsp5R6lbrpKD6i5ndMjA/exec';

function tagClass(t){
  const lc=t.toLowerCase();
  if(lc.includes('piscina'))return 'tag-piscina';
  if(lc.includes('splash'))return 'tag-splash';
  if(lc.includes('crazy')||lc.includes('socks')||lc.includes('goofy'))return 'tag-crazy';
  if(lc.includes('gira'))return 'tag-gira';
  if(lc.includes('cierre'))return 'tag-cierre';
  if(lc.includes('feriado'))return 'tag-feriado';
  if(lc.includes('bienvenida'))return 'tag-bienvenida';
  if(lc.includes('pijama'))return 'tag-pijama';
  if(lc.includes('ensayo'))return 'tag-ensayo';
  if(lc.includes('picnic')||lc.includes('huerto'))return 'tag-huerto';
  return 'tag-gira';
}

async function cargarDatos(){
  const grid=document.getElementById('cal-days');
  if(grid)grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:#9ca3af;font-weight:700">Cargando calendario...</div>';
  try{
    const res=await fetch(API_URL);
    const json=await res.json();
    const actividades=json.actividades;
    JUNE={};
    const semanasMap={};
    const campSet=new Set();
    actividades.forEach(act=>{
      const fecha=new Date(act.fecha);
      const dia=fecha.getUTCDate();
      const esFeriado=act.feriado==='TRUE';
      const tipo=['Martes','Jueves'].includes(act.dia_nombre)?'mj':'lmv';
      const tags=act.tags?act.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>({l:t,c:tagClass(t)})):[];
      const notes=act.nota?[act.nota]:[];
      JUNE[dia]={
        tags,notes,type:tipo,
        hasImg:!!act.imagen_url,
        imgUrl:act.imagen_url||'',
        giraLink:act.gira_url||'',
        feriado:esFeriado
      };
      const semLabel=act.semana;
      if(!semanasMap[semLabel])semanasMap[semLabel]=[];
      semanasMap[semLabel].push(dia);
      if(!esFeriado)campSet.add(dia);
    });
    WEEKS=Object.entries(semanasMap).map(([label,days])=>({
      label,
      dates:`${Math.min(...days)} – ${Math.max(...days)} de junio`,
      days:days.sort((a,b)=>a-b)
    })).sort((a,b)=>a.days[0]-b.days[0]);
    CAMP_DAYS=[...campSet].sort((a,b)=>a-b);
  }catch(e){
    console.error('Error cargando Sheet:',e);
  }
  renderMonth();
}


cargarDatos();
</script>
